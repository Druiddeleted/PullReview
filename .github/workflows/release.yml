name: Release

# The BigWigs packager picks the CurseForge release channel from the tag's
# GitHub Release status:
#   - tag pushed with no GitHub Release            -> alpha
#   - tag with a GitHub Release marked prerelease  -> beta
#   - tag with a full GitHub Release               -> release
#
# So: push a tag to ship an alpha. To promote, create a GitHub Release for
# that tag (or edit an existing one) and re-run this workflow via the Actions
# tab -> Run workflow.
on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. 0.1.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract release notes for this tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip a leading "v" so "v0.1.0" matches "## 0.1.0" in CHANGELOG.md.
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if ($2 == ver) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Package & upload
        uses: BigWigsMods/packager@v2
        with:
          # TODO: replace 0 with the PullReview CurseForge project ID once the
          # project is created (curseforge.com -> Submit Addon).
          args: -p 0
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
